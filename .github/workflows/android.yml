name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      run-tests:
        description: "Executar testes unitários (JUnit/Gradle)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run-android:
        description: "Executar testes instrumentados (Android emulador)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run-tests == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --max-workers=2

  android-test:
    name: Android Instrumented Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run-android == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: "-no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics -no-snapshot-save"
          script: |
            # Desbloqueia a tela
            adb shell input keyevent 82
            
            # Executa os testes instrumentados
            ./gradlew connectedDebugAndroidTest --max-workers=2